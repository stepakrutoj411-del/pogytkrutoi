<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ton Mini App</title>
    <!-- Подключаем скрипты -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #2481cc;
            --bg: var(--tg-theme-bg-color, #fff);
            --text: var(--tg-theme-text-color, #000);
            --sec-bg: var(--tg-theme-secondary-bg-color, #efeff4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            user-select: none;
            overflow: hidden;
        }

        /* Верхняя панель баланса */
        .header {
            background: var(--sec-bg);
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ccc;
            font-weight: bold;
            font-size: 18px;
            color: var(--primary);
        }

        #content {
            height: calc(100vh - 120px);
            overflow-y: auto;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Карточка профиля */
        .profile-card {
            background: var(--sec-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: #ccc;
            margin-bottom: 10px;
            border: 2px solid var(--primary);
        }

        /* Меню выбора игр */
        .menu-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Магазин */
        .shop-item {
            background: var(--sec-bg);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Игра Мины */
        .game-container { position: relative; width: 280px; height: 280px; margin: 0 auto; background: #333; border-radius: 8px; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); height: 100%; width: 100%; position: absolute; z-index: 2; }
        .cell { border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; background: #444; }
        .cell.open { background: transparent; }
        .bg-img { position: absolute; width: 100%; height: 100%; background-image: url('game_bg.jpg'); background-size: cover; z-index: 1; }

        /* Нижняя навигация */
        .nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--sec-bg);
            display: flex; justify-content: space-around;
            border-top: 1px solid #ccc;
            padding-bottom: 15px;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #8e8e93; font-size: 12px; text-decoration: none;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { margin-bottom: 4px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">💎 <span id="bal">100.00</span> TON</div>

    <div id="content">
        <!-- Контент подгружается сюда -->
    </div>

    <nav class="nav">
        <div class="nav-item" id="n-prof" onclick="tab('profile')">
            <i data-lucide="user"></i>Профиль
        </div>
        <div class="nav-item" id="n-game" onclick="tab('games')">
            <i data-lucide="gamepad-2"></i>Игры
        </div>
        <div class="nav-item" id="n-shop" onclick="tab('shop')">
            <i data-lucide="shopping-cart"></i>Магазин
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let user = {
            balance: parseFloat(localStorage.getItem('ton_bal')) || 100.00,
            bet: 5,
            mines: 3
        };

        function updateBal() {
            document.getElementById('bal').innerText = user.balance.toFixed(2);
            localStorage.setItem('ton_bal', user.balance);
        }

        function tab(name) {
            const c = document.getElementById('content');
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
            
            if(name === 'profile') {
                document.getElementById('n-prof').classList.add('active');
                c.innerHTML = `
                    <div class="profile-card">
                        <img src="${tg.initDataUnsafe.user?.photo_url || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" class="avatar">
                        <h3>${tg.initDataUnsafe.user?.first_name || 'Игрок'}</h3>
                        <p>Ваш баланс полностью готов к игре!</p>
                    </div>
                `;
            } else if(name === 'games') {
                document.getElementById('n-game').classList.add('active');
                c.innerHTML = `
                    <button class="menu-btn" onclick="openMines()">🕹️ Соло: МИНЫ</button>
                    <button class="menu-btn" onclick="openPvP()" style="background:#555">⚔️ PvP: РУЛЕТКА</button>
                `;
            } else if(name === 'shop') {
                document.getElementById('n-shop').classList.add('active');
                c.innerHTML = `
                    <div class="shop-item"><span>🍭 Чупачупс</span><button onclick="buy(1)">1 TON</button></div>
                    <div class="shop-item"><span>🎁 VIP Статус</span><button onclick="buy(50)">50 TON</button></div>
                `;
            }
            if (window.lucide) lucide.createIcons();
        }

        // --- ЛОГИКА ИГР ---
        function openMines() {
            const c = document.getElementById('content');
            c.innerHTML = `
                <div style="margin-bottom:10px">Ставка: <input type="number" id="bt" value="${user.bet}" style="width:50px"></div>
                <div class="game-container">
                    <div class="bg-img"></div>
                    <div class="grid" id="g"></div>
                </div>
                <button class="menu-btn" style="margin-top:10px" onclick="startMines()">Играть</button>
                <button onclick="tab('games')" style="background:none; border:none; color:grey; width:100%">Назад</button>
            `;
            const g = document.getElementById('g');
            for(let i=0; i<25; i++) g.innerHTML += `<div class="cell"></div>`;
        }

        let mPos = [];
        function startMines() {
            const b = parseFloat(document.getElementById('bt').value);
            if(user.balance < b) return alert("Мало TON!");
            user.balance -= b; updateBal();
            
            mPos = [];
            while(mPos.length < 3) {
                let r = Math.floor(Math.random()*25);
                if(!mPos.includes(r)) mPos.push(r);
            }
            
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.className = 'cell'; cell.innerHTML = '';
                cell.onclick = () => {
                    if(mPos.includes(i)) {
                        cell.classList.add('open'); cell.style.background = 'red'; cell.innerHTML = '💣';
                        alert("Взрыв!"); openMines();
                    } else {
                        cell.classList.add('open');
                        user.balance += (b * 0.1); updateBal();
                    }
                };
            });
        }

        function openPvP() {
            alert("Поиск соперника...");
            setTimeout(() => {
                if(Math.random() > 0.5) alert("Вы выиграли 10 TON!");
                else alert("Вы проиграли!");
            }, 2000);
        }

        function buy(p) {
            if(user.balance >= p) { user.balance -= p; updateBal(); alert("Куплено!"); }
            else alert("Нет денег!");
        }

        // Запуск
        window.onload = () => {
            tab('profile');
            updateBal();
        };
    </script>
</body>
</html>
