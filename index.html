<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 10px 0;
            border-top: 1px solid #ccc;
            padding-bottom: 20px; /* Для iPhone */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: var(--tg-theme-hint-color, #999);
            flex: 1;
        }

        .nav-item.active {
            color: var(--tg-theme-button-color, #2481cc);
        }

        .nav-item span {
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="content">Загрузка...</div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="showTab('profile', this)">
            <i data-lucide="user"></i>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showTab('games', this)">
            <i data-lucide="gamepad-2"></i>
            <span>Игры</span>
        </div>
        <div class="nav-item" onclick="showTab('shop', this)">
            <i data-lucide="shopping-cart"></i>
            <span>Магазин</span>
        </div>
    </nav>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        function showTab(tab, element) {
            const content = document.getElementById('content');
            
            // Сброс активных классов
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // Установка активного класса
            element.classList.add('active');

            // Смена контента
            if (tab === 'profile') {
                content.innerHTML = "👤 Профиль игрока";
            } else if (tab === 'games') {
                content.innerHTML = "🎮 Список игр";
            } else if (tab === 'shop') {
                content.innerHTML = "🛍️ Магазин";
            }
        }

        // По умолчанию открываем профиль
        showTab('profile', document.querySelector('.nav-item'));
        
        // Инициализация иконок Lucide
        lucide.createIcons();
    </script>
</body>
</html>
