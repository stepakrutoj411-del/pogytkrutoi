<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Mines</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #2481cc;
            --bg-color: var(--tg-theme-bg-color, #fff);
            --text-color: var(--tg-theme-text-color, #000);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #content {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Контейнер игры */
        .game-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin-top: 20px;
            border: 4px solid var(--primary-color);
            border-radius: 12px;
            overflow: hidden;
            background-color: #222;
        }

        /* Сама картинка под сеткой */
        .image-underlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Замените game_bg.jpg на ваше название файла */
            background-image: url('game_bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Сетка клеток поверх картинки */
        .mines-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            z-index: 2;
        }

        .cell {
            background-color: #333; /* Цвет закрытой клетки */
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s, opacity 0.5s;
        }

        /* Когда клетка открыта */
        .cell.open {
            background-color: transparent;
            border: none;
        }

        .cell.mine {
            background-color: rgba(255, 0, 0, 0.7) !important;
        }

        .status {
            margin: 15px 0;
            font-weight: bold;
            text-align: center;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
        }

        /* Меню */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px 0;
            background: var(--sec-bg);
            border-top: 1px solid #ccc;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #999;
            flex: 1;
            font-size: 12px;
        }

        .nav-item.active {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div id="content"></div>

    <nav class="bottom-nav">
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')">
            <i data-lucide="user"></i>
            <span>Профиль</span>
        </div>
        <div class="nav-item" id="nav-games" onclick="showTab('games')">
            <i data-lucide="gamepad-2"></i>
            <span>Игры</span>
        </div>
        <div class="nav-item" id="nav-shop" onclick="showTab('shop')">
            <i data-lucide="shopping-cart"></i>
            <span>Магазин</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let minesPositions = [];
        let gameOver = false;

        function showTab(tab) {
            const content = document.getElementById('content');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + tab).classList.add('active');

            if (tab === 'profile') {
                content.innerHTML = `<h1>👤 Профиль</h1><p>Игрок: ${tg.initDataUnsafe.user?.first_name || "User"}</p>`;
            } 
            else if (tab === 'games') {
                content.innerHTML = `
                    <div class="status" id="game-status">Открывай клетки аккуратно!</div>
                    <div class="game-wrapper">
                        <div class="image-underlay"></div>
                        <div class="mines-grid" id="grid"></div>
                    </div>
                    <br>
                    <button class="btn" onclick="initGame()">Начать заново</button>
                `;
                initGame();
            } 
            else if (tab === 'shop') {
                content.innerHTML = "<h1>🛍️ Магазин</h1><p>Тут будут скины...</p>";
            }
            lucide.createIcons();
        }

        function initGame() {
            minesPositions = [];
            gameOver = false;
            const status = document.getElementById('game-status');
            status.innerText = "Найди чистые клетки!";
            status.style.color = "inherit";

            // Генерируем 4 мины
            while(minesPositions.length < 4) {
                let r = Math.floor(Math.random() * 25);
                if(!minesPositions.includes(r)) minesPositions.push(r);
            }

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell
 
= document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => handleCellClick(i, cell);
                grid.appendChild(cell);
            }
        }

        function handleCellClick(index, cell) {
            if (gameOver || cell.classList.contains('open')) return;

            if (minesPositions.includes(index)) {
                // ПОРАЖЕНИЕ
                gameOver = true;
                cell.classList.add('mine');
                cell.innerHTML = "💥";
                document.getElementById('game-status').innerText = "БУМ! Вы проиграли!";
                document.getElementById('game-status').style.color = "red";
                // Показать все мины
                minesPositions.forEach(pos => {
                    document.getElementById('grid').children[pos].innerHTML = "💣";
                });
            } else {
                // УСПЕХ: Клетка становится прозрачной, открывая часть фото
                cell.classList.add('open');
                cell.innerHTML = ""; // Убираем текст, чтобы видеть картинку
            }
        }

        showTab('profile');
    </script>
</body>
</html>
