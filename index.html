<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ton Roulette PvP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f1115;
            --sec-bg: #1a1d23;
            --primary: #2481cc;
            --pink: #e940d3;
            --cyan: #3cd3c1;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            user-select: none;
            overflow: hidden;
        }

        /* Хедер из скриншота */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg);
        }
        .pot-badge {
            background: #1a1d23;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            color: #8e8e93;
        }
        .pot-badge span { color: #50a1e3; }

        .icon-btn {
            background: #1a1d23;
            border: none;
            color: white;
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Колесо */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .center-timer {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #000;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .timer-val { font-size: 24px; font-weight: bold; }
        .pointer-top {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid white; /* Перевернутый треугольник как на скрине */
            z-index: 11;
        }

        /* Инвентарь и вкладки */
        #content { height: calc(100vh - 140px); overflow-y: auto; padding: 15px; }
        
        .nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--sec-bg); display: flex; justify-content: space-around;
            border-top: 1px solid #333; padding-bottom: 15px;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #8e8e93; font-size: 11px; text-decoration: none;
        }
        .nav-item.active { color: var(--primary); }

        .bet-controls {
            padding: 20px;
            background: var(--sec-bg);
            border-radius: 20px 20px 0 0;
            position: fixed; bottom: 70px; width: 100%;
            box-sizing: border-box;
        }

        .main-btn {
            background: var(--primary);
            color: white; border: none;
            width: 100%; padding: 15px;
            border-radius: 12px; font-weight: bold; font-size: 16px;
        }

        /* Аватарки на круге */
        .player-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            transition: all 0.3s;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="game-header">
            <button class="icon-btn"><i data-lucide="history"></i></button>
            <div class="pot-badge">ВСЕГО <span id="total-pot">0</span> <span>TON</span></div>
            <button class="icon-btn"><i data-lucide="message-circle"></i></button>
        </div>

        <div class="wheel-container">
            <div class="pointer-top"></div>
            <div class="center-timer">
                <div class="timer-val" id="timer">00:30</div>
            </div>
            <svg id="wheel-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#e940d3" stroke-width="10" />
                <circle id="player-sector" cx="50" cy="50" r="45" fill="none" stroke="#3cd3c1" stroke-width="10" stroke-dasharray="0 283" />
            </svg>
            <!-- Аватарки будут тут -->
            <div id="avatars-container"></div>
        </div>

        <div class="bet-controls">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span>Ваш баланс: <b id="bal-val">100</b> TON</span>
                <span onclick="openWallet()" style="color:var(--primary); cursor:pointer">+ Пополнить</span>
            </div>
            <button class="main-btn" id="bet-btn" onclick="placeBet()">ПОСТАВИТЬ 1 TON</button>
        </div>
    </div>

    <div id="content" class="hidden">
        <!-- Сюда подгружается инвентарь или профиль -->
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="showGame()"><i data-lucide="layout-grid"></i>Игра</div>
        <div class="nav-item" onclick="showInventory()"><i data-lucide="briefcase"></i>Инвентарь</div>
        <div class="nav-item" onclick="showShop()"><i data-lucide="shopping-cart"></i>Магазин</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = parseFloat(localStorage.getItem('ton_bal')) || 100.0;
        let inventory = JSON.parse(localStorage.getItem('inv')) || [];
        let timerSeconds = 30;
        let isSpinning = false;
        let currentBet = 0;
        let totalPot = 0;

        function updateUI() {
            document.getElementById('bal-val').innerText = balance.toFixed(2);
            document.getElementById('total-pot').innerText = totalPot.toFixed(2);
            localStorage.setItem('ton_bal', balance);
            localStorage.setItem('inv', JSON.stringify(inventory));
        }

        // Логика таймера и "онлайна"
        function startTimer() {
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                if (isSpinning) return;
                
                timerSeconds--;
                let s = timerSeconds < 10 ? '0' + timerSeconds : timerSeconds;
                timerEl.innerText = `00:${s}`;

                // Имитация захода других игроков
                if (timerSeconds % 7 === 0 && timerSeconds > 5) {
                    addFakePlayer();
                }

                if (timerSeconds <= 0) {
                    spinWheel();
                    timerSeconds = 30;
                }
            }, 1000);
        }

        function addFakePlayer() {
            let bet = Math.floor(Math.random() * 5) + 1;
            totalPot += bet;
            updateUI();
            // В реальности тут прилетал бы Webhook от сервера
        }

        function placeBet() {
            if (balance >= 1) {
                balance -= 1;
                currentBet += 1;
                totalPot += 1;
                
                // Рисуем наш сектор (бирюзовый)
                let percent = (currentBet / totalPot) * 283;
                document.getElementById('player-sector').setAttribute('stroke-dasharray', `${percent} 283`);
                
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function spinWheel() {
            isSpinning = true;
            const wheel = document.getElementById('wheel-svg');
            const randomDeg = 1800 + Math.random() * 1800;
            wheel.style.transform = `rotate(${randomDeg}deg)`;

            setTimeout(() => {
                isSpinning = false;
                wheel.style.transition = 'none';
                wheel.style.transform = 'rotate(0deg)';
                setTimeout(() => wheel.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)', 50);
                
                // Результат
                if (currentBet > 0) {
                    let win = Math.random() < (currentBet / totalPot);
                    if (win) {
                        let prize = totalPot * 0.95;
                        balance += prize;
                        alert(`Вы выиграли ${prize.toFixed(2)} TON!`);
                    } else {
                        alert("Победа за игроком #429");
                    }
                }
                
                currentBet = 0;
                totalPot = 0;
                document.getElementById('player-sector').setAttribute('stroke-dasharray', `0 283`);
                updateUI();
            }, 5500);
        }

        // Переключение вкладок
        function showGame() {
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('content').classList.add('hidden');
        }

        function showInventory() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            const c = document.getElementById('content');
            c.innerHTML = '<h2>Инвентарь</h2>';if(inventory.length === 0) c.innerHTML += '<p>Пусто</p>';
            inventory.forEach(i => c.innerHTML += `<div style="padding:10px; background:#1a1d23; margin-bottom:5px; border-radius:10px">${i}</div>`);
            lucide.createIcons();
        }

        function showShop() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('content').innerHTML = `
                <h2>Магазин</h2>
                <div onclick="buy('VIP Скин')" style="padding:15px; background:var(--primary); border-radius:10px; text-align:center">Купить VIP Скин (10 TON)</div>
            `;
        }

        function buy(item) {
            if(balance >= 10) {
                balance -= 10;
                inventory.push(item);
                updateUI();
                alert("Куплено!");
            }
        }

        window.onload = () => {
            lucide.createIcons();
            startTimer();
            updateUI();
        };
    </script>
</body>
</html>
