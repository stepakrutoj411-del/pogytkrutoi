<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette PvP & Solo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0f1115; --sec-bg: #1a1d23; --primary: #2481cc; --pink: #e940d3; --cyan: #3cd3c1; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .pot-badge { background: var(--sec-bg); padding: 8px 15px; border-radius: 12px; font-weight: bold; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; }
        .game-card { background: var(--sec-bg); padding: 30px; border-radius: 20px; text-align: center; font-size: 20px; font-weight: bold; border: 1px solid #333; }

        /* Рулетка */
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #wheel-svg { width: 100%; height: 100%; transform: rotate(-90deg); transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .center-timer { position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#000; width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:bold; z-index:5; }
        
        .history-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; padding: 20px; box-sizing: border-box; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--sec-bg); display: flex; justify-content: space-around; padding-bottom: 15px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8e8e93; font-size: 11px; }
        .nav-item.active { color: var(--primary); }
        
        .main-btn { background: var(--primary); color: white; border: none; width: 90%; padding: 15px; border-radius: 12px; font-weight: bold; margin: 10px 5%; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="app">
        <div class="header">
            <button class="icon-btn" onclick="toggleHistory()"><i data-lucide="history"></i></button>
            <div class="pot-badge">ВСЕГО <span id="total-pot">0</span> TON</div>
            <button class="icon-btn" onclick="openWallet()"><i data-lucide="wallet"></i></button>
        </div>

        <div id="main-menu" class="menu-grid">
            <div class="game-card" onclick="showSubMenu('solo')" style="border-color: var(--cyan)">🕹️ СОЛО ИГРЫ</div>
            <div class="game-card" onclick="showSubMenu('pvp')" style="border-color: var(--pink)">⚔️ PVP ИГРЫ</div>
        </div>

        <!-- Подменю Соло -->
        <div id="solo-menu" class="menu-grid hidden">
            <div class="game-card" onclick="startMines()">💣 МИНЫ</div>
            <button onclick="backToMenu()" style="color: grey; background: none; border: none;">Назад</button>
        </div>

        <!-- Подменю PvP -->
        <div id="pvp-menu" class="menu-grid hidden">
            <div class="game-card" onclick="startRoulette()">🎡 РУЛЕТКА</div>
            <button onclick="backToMenu()" style="color: grey; background: none; border: none;">Назад</button>
        </div>

        <!-- Игра Рулетка -->
        <div id="roulette-game" class="hidden">
            <div class="wheel-box">
                <div style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-bottom:15px solid #fff; z-index:10;"></div>
                <div class="center-timer" id="timer">00:30</div>
                <svg id="wheel-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#e940d3" stroke-width="10" />
                    <circle id="player-sector" cx="50" cy="50" r="45" fill="none" stroke="#3cd3c1" stroke-width="10" stroke-dasharray="0 283" />
                </svg>
            </div>
            <button class="main-btn" onclick="sendBet()">ПОСТАВИТЬ 1 TON (Комиссия 5%)</button>
        </div>
    </div>

    <div id="history-modal" class="history-modal">
        <h2>История игр</h2>
        <div id="history-list"></div>
        <button class="main-btn" onclick="toggleHistory()">Закрыть</button>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="backToMenu()"><i data-lucide="gamepad-2"></i>Игры</div>
        <div class="nav-item" onclick="alert('Инвентарь')"><i data-lucide="briefcase"></i>Инвентарь</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 100;
        let ws;
        let myId = tg.initDataUnsafe.user?.id || Math.random();
        let myName = tg.initDataUnsafe.user?.first_name || "Игрок";

        // WebSocket соединение
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'sync') {
                    document.getElementById('total-pot').innerText = data.state.total_pot;
                    updateHistory(data.state.history);
                    updateWheel(data.state);
                } else if (data.type === 'timer') {
                    document.getElementById('timer').innerText = `00:${data.value < 10 ? '0' + data.value : data.value}`;
                } else if (data.type === 'result') {
                    animateWin(data);
                }
            };
        }

        function sendBet() {
            if (balance >= 1) {balance -= 1;
                ws.send(JSON.stringify({
                    type: 'bet',
                    id: myId,
                    name: myName,
                    amount: 1,
                    color: '#3cd3c1'
                }));
            }
        }

        function updateWheel(state) {
            let myBet = state.players.filter(p => p.id === myId).reduce((a, b) => a + b.bet, 0);
            if (state.total_pot > 0) {
                let percent = (myBet / state.total_pot) * 283;
                document.getElementById('player-sector').setAttribute('stroke-dasharray', `${percent} 283`);
            }
        }

        function animateWin(data) {
            const wheel = document.getElementById('wheel-svg');
            wheel.style.transform = `rotate(${3600 + Math.random() * 360}deg)`;
            setTimeout(() => {
                alert(`Победитель: ${data.winner.name}\nБанк: ${data.prize} TON (за вычетом 5%)`);
                wheel.style.transition = 'none';
                wheel.style.transform = 'rotate(-90deg)';
                setTimeout(() => wheel.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)', 100);
                if (data.winner.id === myId) {
                    balance += data.prize;
                }
            }, 5500);
        }

        function updateHistory(list) {
            const container = document.getElementById('history-list');
            container.innerHTML = list.map(h => `<div style="padding:10px; border-bottom:1px solid #333">${h.winner} выиграл ${h.pot} TON</div>`).join('');
        }

        // Навигация
        function showSubMenu(type) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById(`${type}-menu`).classList.remove('hidden');
        }
        function backToMenu() {
            document.querySelectorAll('.menu-grid, #roulette-game').forEach(el => el.classList.add('hidden'));
            document.getElementById('main-menu').classList.remove('hidden');
        }
        function startRoulette() {
            document.getElementById('pvp-menu').classList.add('hidden');
            document.getElementById('roulette-game').classList.remove('hidden');
        }
        function toggleHistory() {
            const m = document.getElementById('history-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        window.onload = () => { lucide.createIcons(); connect(); };
    </script>
</body>
</html>
